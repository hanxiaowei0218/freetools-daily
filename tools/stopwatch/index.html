<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>在线秒表 - AI工具箱</title><meta name="description" content="精准在线秒表，支持计次和重置。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">⏱️</div><h1>在线秒表</h1><p>精准在线秒表，支持计次和重置。</p></header><div class="card"><div style="font-size:3.5rem;text-align:center;font-family:Courier New,monospace;font-weight:700;padding:20px;background:#1e293b;color:#22c55e;border-radius:12px" id="dp">00:00.00</div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" onclick="tg()" id="sb" style="flex:1">▶ 开始</button><button class="btn btn-outline" onclick="lp()" style="flex:1">🏁 计次</button><button class="btn btn-outline" onclick="rst()" style="flex:1">🔄 重置</button></div><div style="margin-top:16px;max-height:200px;overflow:auto" id="ls"></div></div><script>var rn=false,st=0,el=0,iv;function fm(ms){var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(cs).padStart(2,"0")}function up(){dp.textContent=fm(el+(rn?Date.now()-st:0))}function tg(){if(rn){el+=Date.now()-st;clearInterval(iv);sb.textContent="▶ 开始";sb.className="btn btn-primary"}else{st=Date.now();iv=setInterval(up,10);sb.textContent="⏸ 暂停";sb.className="btn btn-outline"}rn=!rn}function lp(){if(!el&&!rn)return;var t=rn?el+Date.now()-st:el,d=document.createElement("div");d.style.cssText="padding:8px 12px;border-bottom:1px solid var(--border);font-family:Courier New;display:flex;justify-content:space-between";d.innerHTML="<span>计次 "+(ls.children.length+1)+"</span><span style=color:var(--accent);font-weight:700>"+fm(t)+"</span>";ls.prepend(d)}function rst(){rn=false;clearInterval(iv);el=0;dp.textContent="00:00.00";sb.textContent="▶ 开始";sb.className="btn btn-primary";ls.innerHTML=""}</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
