osition:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">😂</div><h1>表情包生成器</h1><p>上传图片，添加文字，一键生成表情包。</p></header><div class="card"><div style="border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px" id="dz" onclick="fi.click()"><div style="font-size:3rem">📁</div><p style="color:var(--muted)">点击上传图片制作表情包</p><input type="file" id="fi" accept="image/*" style="display:none"></div><div id="ed" style="display:none"><canvas id="cv" style="max-width:100%;display:block;border-radius:8px;margin:0 auto"></canvas><input id="tt" placeholder="上方文字（可选）" style="margin-top:8px"><input id="bt" placeholder="下方文字（可选）" style="margin-top:8px"><div class="r"><label style="min-width:40px">字号</label><input type="range" id="fs" min="20" max="80" value="40" style="flex:1"><span id="sv">40</span></div><button class="btn btn-primary" onclick="dr()" style="width:100%;margin-top:8px">🔄 预览</button><button class="btn btn-outline" onclick="dl()" style="width:100%;margin-top:8px">⬇ 下载</button></div></div><script>var img=null;fi.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){img=new Image();img.onload=function(){ed.style.display="block";dz.style.display="none";dr()};img.src=ev.target.result};r.readAsDataURL(f)};function dr(){if(!img)return;var w=img.width,h=img.height,mw=600,s=1;if(w>mw){s=mw/w;w=mw;h=Math.floor(img.height*s)}cv.width=w;cv.height=h;var c=cv.getContext("2d");c.drawImage(img,0,0,w,h);var fs=+document.getElementById("fs").value,tt=document.getElementById("tt").value,bt=document.getElementById("bt").value;c.fillStyle="#fff";c.strokeStyle="#000";c.lineWidth=fs/8;c.font="bold "+fs+"px sans-serif";c.textAlign="center";if(tt){c.strokeText(tt,w/2,fs+10);c.fillText(tt,w/2,fs+10)}if(bt){c.strokeText(bt,w/2,h-20);c.fillText(bt,w/2,h-20)}}fs.oninput=function(){sv.textContent=this.value;dr()};tt.oninput=dr;bt.oninput=dr;function dl(){var a=document.createElement("a");a.href=cv.toDataURL();a.download="meme.png";a.click()}</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
