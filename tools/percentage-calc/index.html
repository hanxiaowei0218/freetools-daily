<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>百分比计算器 - AI工具箱</title><meta name="description" content="快速计算百分比、折扣、涨跌幅。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">💯</div><h1>百分比计算器</h1><p>快速计算百分比、折扣、涨跌幅。</p></header><div class="card"><div class="r"><input id="n1" type="number" placeholder="数值" value="200"><span style="font-size:1.2rem;font-weight:700">的</span><input id="n2" type="number" placeholder="百分比" value="15"><span style="font-size:1.2rem;font-weight:700">%</span></div><div style="font-size:1.4rem;text-align:center;font-weight:800;padding:16px;background:#eef2ff;border-radius:10px;color:var(--accent)" id="rp">= 30</div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-outline" id="b1" style="flex:1;background:var(--accent);color:#fff">% 占比</button><button class="btn btn-outline" id="b2" style="flex:1">🏷️ 折扣</button><button class="btn btn-outline" id="b3" style="flex:1">📈 涨跌幅</button></div></div><script>var md="pct";function calc(){var a=+n1.value||0,b=+n2.value||0,r;if(md=="pct")r=a*b/100,rp.textContent="= "+r.toFixed(2);else if(md=="discount")r=a*(1-b/100),rp.textContent="折后价: "+r.toFixed(2);else r=(b-a)/a*100,rp.textContent="涨跌: "+r.toFixed(2)+"%"}[n1,n2].forEach(function(e){e.oninput=calc});b1.onclick=function(){md="pct";calc();b1.style.background="var(--accent)";b1.style.color="#fff";b2.style.background="#fff";b2.style.color="var(--accent)";b3.style.background="#fff";b3.style.color="var(--accent)"};b2.onclick=function(){md="discount";calc();b2.style.background="var(--accent)";b2.style.color="#fff";b1.style.background="#fff";b1.style.color="var(--accent)";b3.style.background="#fff";b3.style.color="var(--accent)"};b3.onclick=function(){md="change";calc();b3.style.background="var(--accent)";b3.style.color="#fff";b1.style.background="#fff";b1.style.color="var(--accent)";b2.style.background="#fff";b2.style.color="var(--accent)"};calc()</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
