<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编解码工具 - AI工具箱</title>
<meta name="description" content="在线Base64编码解码工具，支持文本和文件。浏览器本地处理，安全快速。">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:30px 20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}
.back:hover{text-decoration:underline}
header{text-align:center;margin-bottom:24px}
header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}
.tabs{display:flex;gap:0;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:#fff;font-weight:600;font-size:.9rem;transition:all .2s;border:none}
.tab.active{background:var(--accent);color:#fff}
textarea{width:100%;min-height:150px;border:2px solid var(--border);border-radius:12px;padding:16px;font-size:.9rem;font-family:'Courier New',monospace;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.result-area{background:#1e293b;color:#e2e8f0;min-height:120px;border-radius:12px;padding:16px;font-family:'Courier New',monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;overflow:auto;max-height:300px;margin-top:12px;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}
.copy-btn:hover{background:rgba(255,255,255,.25)}
footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">← 返回工具箱</a>
<header><div class="icon">🔢</div><h1>Base64 编解码</h1><p>文本 ↔ Base64 · 浏览器本地处理 · 安全快速</p></header>

<div class="tabs">
<button class="tab active" id="tabEncode">🔒 编码 (Encode)</button>
<button class="tab" id="tabDecode">🔓 解码 (Decode)</button>
</div>

<textarea placeholder="输入要编码的文本..." id="input"></textarea>
<div class="result-area" id="result" style="display:none">
<button class="copy-btn" id="copyBtn">📋 复制</button>
<span id="resultText"></span>
</div>

<footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer>
</div>

<script>
var mode='encode',inp=document.getElementById('input'),res=document.getElementById('result'),resT=document.getElementById('resultText');
function update(){
if(!inp.value.trim()){res.style.display='none';return}
try{
if(mode==='encode')resT.textContent=btoa(unescape(encodeURIComponent(inp.value)));
else resT.textContent=decodeURIComponent(escape(atob(inp.value.trim())));
res.style.display='block';
}catch(e){resT.textContent='错误: '+e.message;res.style.display='block'}
}
inp.addEventListener('input',update);
document.getElementById('tabEncode').onclick=function(){mode='encode';document.getElementById('tabEncode').classList.add('active');document.getElementById('tabDecode').classList.remove('active');update()};
document.getElementById('tabDecode').onclick=function(){mode='decode';document.getElementById('tabDecode').classList.add('active');document.getElementById('tabEncode').classList.remove('active');update()};
document.getElementById('copyBtn').onclick=function(){navigator.clipboard.writeText(resT.textContent);this.textContent='✅ 已复制';setTimeout(()=>this.textContent='📋 复制',1500)};
inp.value='Hello, AI工具箱! 🛠️';update();
</script>
</body>
</html>
