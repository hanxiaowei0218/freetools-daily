<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>大小写转换器 - AI工具箱</title><meta name="description" content="一键转换英文大小写、驼峰、下划线等格式。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">🔤</div><h1>大小写转换器</h1><p>一键转换英文大小写、驼峰、下划线等格式。</p></header><div class="card"><textarea id="inp" placeholder="输入英文文本..." style="min-height:100px"></textarea><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px"><button class="btn btn-outline" onclick="cv('upper')">UPPERCASE</button><button class="btn btn-outline" onclick="cv('lower')">lowercase</button><button class="btn btn-outline" onclick="cv('title')">Title Case</button><button class="btn btn-outline" onclick="cv('sentence')">Sentence case</button><button class="btn btn-outline" onclick="cv('camel')">camelCase</button><button class="btn btn-outline" onclick="cv('snake')">snake_case</button></div><div class="result" id="r" style="display:none"><button class="copy-btn" onclick="copy(this,r.innerText.trim())">📋 复制</button></div></div><script>function cv(t){var v=inp.value,o="";if(t=="upper")o=v.toUpperCase();else if(t=="lower")o=v.toLowerCase();else if(t=="title")o=v.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.substr(1).toLowerCase()});else if(t=="sentence")o=v.toLowerCase().replace(/(^\s*|[.!?]\s+)([a-z])/g,function(_,s,l){return s+l.toUpperCase()});else if(t=="camel")o=v.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,function(_,c){return c.toUpperCase()});else if(t=="snake")o=v.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");r.innerHTML="<button class=copy-btn onclick=\"copy(this,r.innerText.trim())\">📋 复制</button>"+o;r.style.display="block"}function copy(btn,t){navigator.clipboard.writeText(t);btn.textContent="✅ 已复制";setTimeout(function(){btn.textContent="📋 复制"},1500)}</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
