<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:30px 20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}
.back:hover{text-decoration:underline}
header{text-align:center;margin-bottom:30px}
header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}
.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}
input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,textarea:focus{border-color:var(--accent)}
.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:'Courier New',monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}
.copy-btn:hover{background:rgba(255,255,255,.25)}
footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="container">

<a class="back" href="/">? ?????</a>

<div class="card">
<textarea id="input" placeholder="??????..." style="min-height:100px"></textarea>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
<button class="btn btn-outline" onclick="convert('upper')">UPPERCASE</button>
<button class="btn btn-outline" onclick="convert('lower')">lowercase</button>
<button class="btn btn-outline" onclick="convert('title')">Title Case</button>
<button class="btn btn-outline" onclick="convert('sentence')">Sentence case</button>
<button class="btn btn-outline" onclick="convert('camel')">camelCase</button>
<button class="btn btn-outline" onclick="convert('snake')">snake_case</button>
</div>
<div class="result" id="result" style="display:none"><button class="copy-btn" onclick="copy(this,document.getElementById('result').textContent.trim())">?? ??</button></div>
</div>
<script>
function convert(type){
var t=document.getElementById('input').value,r='';
if(type=='upper')r=t.toUpperCase();
else if(type=='lower')r=t.toLowerCase();
else if(type=='title')r=t.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.substr(1).toLowerCase()});
else if(type=='sentence')r=t.toLowerCase().replace(/(^\s*|[.!?]\s+)([a-z])/g,function(_,s,l){return s+l.toUpperCase()});
else if(type=='camel')r=t.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,function(_,c){return c.toUpperCase()});
else if(type=='snake')r=t.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
document.getElementById('result').innerHTML='<button class="copy-btn" onclick="copy(this,document.getElementById('result').textContent.trim())">?? ??</button>'+r;
document.getElementById('result').style.display='block';
}
function copy(btn,text){navigator.clipboard.writeText(text);btn.textContent='? ???';setTimeout(function(){btn.textContent='?? ??'},1500)}
</script>

</div>
