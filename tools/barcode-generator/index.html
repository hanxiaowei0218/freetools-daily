<script>
var canvas=document.getElementById('canvas');
function generate(){
var text=document.getElementById('code').value;
if(!text){return}
var w=400,h=150,ctx=canvas.getContext('2d');
canvas.width=w;canvas.height=h;
ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#000';
var bits=[];
for(var i=0;i<text.length;i++){var c=text.charCodeAt(i).toString(2).padStart(8,'0');bits.push('1'+c+'0')}
bits.push('11');
var total=bits.join('').length,barW=Math.max(1,Math.floor((w-60)/total)),startX=(w-total*barW)/2;
ctx.fillStyle='#000';
for(var i=0;i<total;i++){
if(bits.join('')[i]==='1')ctx.fillRect(startX+i*barW,20,barW,100);
}
ctx.fillStyle='#000';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText(text,w/2,145);
document.getElementById('downloadBtn').disabled=false;
}
function download(){var a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='barcode.png';a.click()}
generate();
</script>
