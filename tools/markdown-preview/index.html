<script>
function md2html(t){
return t.replace(/^### (.+)$/gm,'<h3 style="margin:12px 0 6px">$1</h3>')
.replace(/^## (.+)$/gm,'<h2 style="margin:16px 0 8px">$1</h2>')
.replace(/^# (.+)$/gm,'<h1 style="margin:20px 0 10px">$1</h1>')
.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
.replace(/\*(.+?)\*/g,'<i>$1</i>')
.replace(/`(.+?)`/g,'<code style="background:#eef2ff;padding:2px 6px;border-radius:4px;font-size:.85em">$1</code>')
.replace(/^\- (.+)$/gm,'<li style="margin-left:20px">$1</li>')
.replace(/^\d+\. (.+)$/gm,'<li style="margin-left:20px;list-style:decimal">$1</li>')
.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" style="color:var(--accent)" target="_blank">$1</a>')
.replace(/\n\n/g,'<br><br>')
.replace(/^---$/gm,'<hr style="margin:16px 0;border:0;border-top:1px solid var(--border)">')
.replace(/^> (.+)$/gm,'<blockquote style="border-left:3px solid var(--accent);padding-left:12px;color:var(--muted);margin:8px 0">$1</blockquote>');
}
document.getElementById('input').oninput=function(){document.getElementById('preview').innerHTML=md2html(this.value)};
