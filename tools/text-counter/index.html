<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字数统计器 - AI工具箱</title>
<meta name="description" content="在线实时统计中英文字数、字符数、段落数、行数。写作好帮手，浏览器本地处理。">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:30px 20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}
.back:hover{text-decoration:underline}
header{text-align:center;margin-bottom:24px}
header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}
textarea{width:100%;min-height:200px;border:2px solid var(--border);border-radius:12px;padding:16px;font-size:1rem;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.stat-card{background:var(--card);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--accent)}.stat-label{font-size:.8rem;color:var(--muted);margin-top:4px}
footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">← 返回工具箱</a>
<header><div class="icon">📝</div><h1>字数统计器</h1><p>实时统计 · 支持中英文 · 写作必备</p></header>

<textarea placeholder="在这里输入或粘贴文本..." id="input"></textarea>

<div class="stats">
<div class="stat-card"><div class="stat-num" id="chars">0</div><div class="stat-label">总字符数</div></div>
<div class="stat-card"><div class="stat-num" id="charsNoSpace">0</div><div class="stat-label">字符数(无空格)</div></div>
<div class="stat-card"><div class="stat-num" id="words">0</div><div class="stat-label">单词/字数</div></div>
<div class="stat-card"><div class="stat-num" id="lines">0</div><div class="stat-label">行数</div></div>
<div class="stat-card"><div class="stat-num" id="cnChars">0</div><div class="stat-label">中文字数</div></div>
<div class="stat-card"><div class="stat-num" id="paragraphs">0</div><div class="stat-label">段落数</div></div>
<div class="stat-card"><div class="stat-num" id="bytes">0</div><div class="stat-label">字节数</div></div>
<div class="stat-card"><div class="stat-num" id="readTime">0</div><div class="stat-label">阅读时间(分钟)</div></div>
</div>

<footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer>
</div>

<script>
var ta=document.getElementById('input');
ta.addEventListener('input',function(){
var t=ta.value;
document.getElementById('chars').textContent=t.length;
document.getElementById('charsNoSpace').textContent=t.replace(/\s/g,'').length;
var cn=t.match(/[\u4e00-\u9fff]/g);document.getElementById('cnChars').textContent=cn?cn.length:0;
var words=t.match(/[\u4e00-\u9fff]+|[a-zA-Z0-9]+/g);document.getElementById('words').textContent=words?words.length:0;
document.getElementById('lines').textContent=t.split(/\n/).length;
document.getElementById('paragraphs').textContent=t.split(/\n\n+/).filter(p=>p.trim()).length||(t.trim()?1:0);
document.getElementById('bytes').textContent=new Blob([t]).size;
document.getElementById('readTime').textContent=Math.max(1,Math.ceil((words?words.length:0)/200));
});
</script>
</body>
</html>
