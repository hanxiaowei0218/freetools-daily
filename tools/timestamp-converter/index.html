<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>时间戳转换器 - AI工具箱</title><meta name="description" content="Unix时间戳与日期互转，支持多时区。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">⏰</div><h1>时间戳转换器</h1><p>Unix时间戳与日期互转，支持多时区。</p></header><div class="card"><label>时间戳（秒）</label><div class="r"><input id="ts" type="number" placeholder="Unix时间戳"><button class="btn btn-primary" onclick="td()" style="width:auto;white-space:nowrap">→ 转日期</button></div><div class="result" id="tsr"><button class="copy-btn" onclick="copy(this,tsr.innerText.trim())">📋 复制</button>等待输入</div><div style="margin-top:20px"><label>日期时间</label></div><input id="di" type="datetime-local"><button class="btn btn-primary" onclick="dt()" style="width:100%;margin-top:8px">→ 转时间戳</button><div class="result" id="dtr"><button class="copy-btn" onclick="copy(this,dtr.innerText.trim())">📋 复制</button>等待输入</div></div><script>document.getElementById("ts").value=Math.floor(Date.now()/1000);function td(){var ts=+document.getElementById("ts").value;if(!ts)return;var d=new Date(ts*1000);tsr.innerHTML="<button class=copy-btn onclick=\"copy(this,tsr.innerText.trim())\">📋 复制</button>"+d.toLocaleString("zh-CN",{timeZone:"Asia/Shanghai"})+" (北京时间)\n"+d.toISOString()+" (UTC)\n毫秒: "+(ts*1000)}function dt(){var v=di.value;if(!v)return;var d=new Date(v),ts=Math.floor(d.getTime()/1000);dtr.innerHTML="<button class=copy-btn onclick=\"copy(this,dtr.innerText.trim())\">📋 复制</button>秒: "+ts+"\n毫秒: "+d.getTime()+"\n"+d.toISOString()}td();di.value=new Date().toISOString().slice(0,16);function copy(b,t){navigator.clipboard.writeText(t);b.textContent="✅ 已复制";setTimeout(function(){b.textContent="📋 复制"},1500)}</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
