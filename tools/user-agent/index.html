<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>User-Agent 解析器 - AI工具箱</title><meta name="description" content="解析浏览器UA，显示设备和系统信息。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">🖥️</div><h1>User-Agent 解析器</h1><p>解析浏览器UA，显示设备和系统信息。</p></header><div class="card"><textarea id="ua" style="min-height:80px;font-family:Courier New,monospace;font-size:.8rem" placeholder="输入 User-Agent 字符串..."></textarea><button class="btn btn-primary" onclick="pa()" style="width:100%;margin-top:8px">🔍 解析</button><div id="r" style="margin-top:12px;padding:16px;background:#eef2ff;border-radius:10px;min-height:60px;line-height:1.8;font-size:.9rem"></div></div><script>function pa(){var u=ua.value,b="",o="",d="Desktop";if(u.includes("Edg/"))b="Edge "+u.match(/Edg\/(\d+)/)[1];else if(u.includes("Chrome/")&&!u.includes("Edg/"))b="Chrome "+u.match(/Chrome\/(\d+)/)[1];else if(u.includes("Firefox/"))b="Firefox "+u.match(/Firefox\/(\d+)/)[1];else if(u.includes("Safari/")&&!u.includes("Chrome"))b="Safari "+(u.match(/Version\/([\d.]+)/)||["","?"])[1];if(u.includes("Windows"))o="Windows";else if(u.includes("Mac OS"))o="macOS";else if(u.includes("Android")){o="Android";d="Mobile"}else if(u.includes("iPhone")||u.includes("iPad")){o="iOS";d=u.includes("iPad")?"Tablet":"Mobile"}else if(u.includes("Linux"))o="Linux";r.innerHTML="<b>浏览器:</b> "+b+"<br><b>操作系统:</b> "+o+"<br><b>设备类型:</b> "+d}ua.value="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0";pa()</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p>
