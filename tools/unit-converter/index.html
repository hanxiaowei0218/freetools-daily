osition:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">📐</div><h1>单位换算器</h1><p>长度/重量/温度/面积/速度在线换算。</p></header><div class="card"><select id="cat" onchange="sw()" style="margin-bottom:12px"><option value="length">📏 长度</option><option value="weight">⚖️ 重量</option><option value="temp">🌡️ 温度</option><option value="area">📐 面积</option><option value="speed">🚀 速度</option></select><div class="r"><input id="iv" type="number" value="1" style="flex:1"><select id="fu" style="width:auto;flex:1"></select></div><div style="text-align:center;font-size:1.5rem;padding:8px">=</div><div class="r"><input id="ov" readonly style="flex:1;background:#eef2ff"><select id="tu" style="width:auto;flex:1"></select></div></div><script>var u={length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.34,yd:0.9144,ft:0.3048,in:0.0254,li:500},weight:{kg:1,g:0.001,mg:0.000001,t:1000,lb:0.4536,oz:0.02835,jin:0.5},temp:{},area:{m2:1,km2:1e6,ha:10000,mu:666.67,ft2:0.0929},speed:{ms:1,kmh:0.2778,mph:0.447,kn:0.5144}};var tc={c:"摄氏度",f:"华氏度",k:"开尔文"};function cv(){var c=cat.value;if(c=="temp"){var v=+iv.value,f=fu.value,t=tu.value,r=v;if(f=="f")r=(v-32)*5/9;else if(f=="k")r=v-273.15;if(t=="f")r=r*9/5+32;else if(t=="k")r=r+273.15;ov.value=r.toFixed(4)}else{var un=u[c],f=fu.value,t=tu.value,r=+iv.value*un[f]/un[t];ov.value=parseFloat(r.toPrecision(10))}}function sw(){var c=cat.value,op="";if(c=="temp"){for(var k in tc)op+="<option value="+k+">"+tc[k]+"</option>"}else{for(var k in u[c])op+="<option value="+k+">"+k+"</option>"}fu.innerHTML=op;tu.innerHTML=op;if(c!="temp")tu.selectedIndex=1;cv()}iv.oninput=cv;fu.onchange=cv;tu.onchange=cv;sw()</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
