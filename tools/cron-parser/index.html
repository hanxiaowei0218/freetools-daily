<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cron 表达式解析 - AI工具箱</title><meta name="description" content="解析Cron定时表达式，显示执行时间。"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3843355642836530" crossorigin="anonymous"></script><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:700px;margin:0 auto;padding:30px 20px}.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}.back:hover{text-decoration:underline}header{text-align:center;margin-bottom:30px}header .icon{font-size:3rem}header h1{font-size:2rem;font-weight:800;margin:8px 0}header p{color:var(--muted)}.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}.btn{padding:10px 20px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}.btn-outline:hover{background:#eef2ff}input,textarea,select{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}input:focus,textarea:focus{border-color:var(--accent)}.result{background:#1e293b;color:#e2e8f0;min-height:80px;border-radius:12px;padding:16px;font-family:Courier New,monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;margin-top:12px;position:relative;overflow:auto;max-height:400px}.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}.copy-btn:hover{background:rgba(255,255,255,.25)}label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}.r{display:flex;gap:12px;align-items:center;margin-bottom:12px}footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}footer a{color:var(--accent);text-decoration:none}</style></head><body><div class="container"><a class="back" href="/">← 返回工具箱</a><header><div class="icon">🕐</div><h1>Cron 表达式解析</h1><p>解析Cron定时表达式，显示执行时间。</p></header><div class="card"><input id="cr" placeholder="Cron表达式，如：0 8 * * *" value="0 8 * * *" style="font-family:Courier New,monospace"><button class="btn btn-primary" onclick="pa()" style="width:100%;margin-top:8px">🔍 解析</button><div id="r" style="margin-top:12px;padding:16px;background:#eef2ff;border-radius:10px;min-height:60px;font-size:.9rem;line-height:1.8"></div></div><script>var dm={0:"分钟",1:"小时",2:"日",3:"月",4:"星期"};function pa(){var p=cr.value.trim().split(/\s+/);if(p.length<5){r.innerHTML="请输入至少5位Cron表达式";return}var h="<b>解析结果：</b><br>";for(var i=0;i<5;i++)h+=dm[i]+": <b>"+desc(p[i],i)+"</b><br>";h+="<br><b>下次执行（北京时间）：</b><br>"+nr(p,5).join("<br>");r.innerHTML=h}function desc(p,i){if(p=="*")return "每"+(i==2?"天":i==3?"月":"");if(p.includes(","))return p.split(",").join(", ");if(p.includes("/")){var a=p.split("/");return "从"+a[0]+"开始每"+a[1]+(i==0?"分钟":i==1?"小时":"")}if(p.includes("-")){var a=p.split("-");return a[0]+"到"+a[1]}return p}function nr(p,n){var rs=[],d=new Date();d.setSeconds(0,0);for(var i=0;i<300;i++){d.setMinutes(d.getMinutes()+1);var m=d.getMinutes(),h=d.getHours(),dom=d.getDate(),mon=d.getMonth()+1,dow=d.getDay();if(mt(p[0],m)&&mt(p[1],h)&&mt(p[2],dom)&&mt(p[3],mon)&&mt(p[4],dow)){rs.push(d.toLocaleString("zh-CN",{timeZone:"Asia/Shanghai"}));if(rs.length>=n)break}}return rs}function mt(e,v){if(e=="*")return true;if(e.includes(","))return e.split(",").includes(String(v));if(e.includes("/")){var a=e.split("/"),s=a[0]=="*"?0:+a[0];return v>=s&&(v-s)%(+a[1])==0}if(e.includes("-")){var a=e.split("-");return v>=+a[0]&&v<=+a[1]}return +e==v}pa()</script><footer><p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p></footer></div></body></html>
