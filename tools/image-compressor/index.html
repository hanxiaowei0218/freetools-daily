<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线图片压缩工具 - AI工具箱</title>
<meta name="description" content="免费在线图片压缩工具，支持PNG/JPEG格式，实时预览压缩效果，调节压缩质量，浏览器本地处理，不上传服务器。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:30px 20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}
.back:hover{text-decoration:underline}
header{text-align:center;margin-bottom:32px}
header .icon{font-size:3rem}
header h1{font-size:2rem;font-weight:800;margin:8px 0}
header p{color:var(--muted)}
.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--card);margin-bottom:24px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:#eef2ff}
.upload-zone .icon{font-size:3rem}
.upload-zone p{color:var(--muted);margin-top:8px}
.upload-zone input{display:none}
.preview-section{display:none}
.preview-section.active{display:block}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.preview-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);text-align:center}
.preview-card h3{font-size:.9rem;color:var(--muted);margin-bottom:12px}
.preview-card img{max-width:100%;max-height:250px;border-radius:8px;object-fit:contain}
.preview-card .size{font-size:.8rem;color:var(--accent);margin-top:8px;font-weight:600}
.controls{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border)}
.controls label{display:block;font-weight:600;margin-bottom:8px}
.controls input[type=range]{width:100%;accent-color:var(--accent)}
.quality-display{text-align:center;color:var(--accent);font-weight:700;font-size:1.2rem;margin:8px 0}
.actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.btn{flex:1;min-width:140px;padding:14px 24px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4f46e5}
.btn-outline{background:#fff;color:var(--accent);border:2px solid var(--accent)}
.btn-outline:hover{background:#eef2ff}
.saved-indicator{display:inline-flex;align-items:center;gap:6px;color:#22c55e;font-size:.85rem;margin-top:12px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
footer{text-align:center;margin-top:60px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
@media(max-width:640px){.preview-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">← 返回工具箱</a>
<header>
<div class="icon">🗜️</div>
<h1>图片压缩工具</h1>
<p>在浏览器本地压缩图片 · 不上传服务器 · 保护你的隐私</p>
</header>

<div class="upload-zone" id="uploadZone">
<div class="icon">📁</div>
<p>点击上传图片 或 拖拽图片到这里</p>
<p style="font-size:.8rem;color:#94a3b8">支持 PNG / JPEG / WebP 格式</p>
<input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
</div>

<div class="preview-section" id="previewSection">
<div class="preview-grid">
<div class="preview-card">
<h3>原图</h3>
<img id="originalPreview" alt="原图预览">
<div class="size" id="originalSize"></div>
</div>
<div class="preview-card">
<h3>压缩后</h3>
<img id="compressedPreview" alt="压缩预览">
<div class="size" id="compressedSize"></div>
</div>
</div>

<div class="controls">
<label>压缩质量：<span id="qualityLabel">80%</span></label>
<input type="range" id="qualitySlider" min="10" max="100" value="80">
<div class="actions">
<button class="btn btn-primary" id="downloadBtn">⬇ 下载压缩图片</button>
<button class="btn btn-outline" id="resetBtn">🔄 重新选择</button>
</div>
</div>
</div>

<footer>
<p>🛠️ <a href="/" style="color:var(--accent)">AI工具箱</a> · 数据处理完全在浏览器本地进行</p>
</footer>
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewSection = document.getElementById('previewSection');
const originalPreview = document.getElementById('originalPreview');
const compressedPreview = document.getElementById('compressedPreview');
const originalSize = document.getElementById('originalSize');
const compressedSize = document.getElementById('compressedSize');
const qualitySlider = document.getElementById('qualitySlider');
const qualityLabel = document.getElementById('qualityLabel');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');

let originalFile = null;
let compressedBlob = null;

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
e.preventDefault();
uploadZone.classList.remove('drag-over');
if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function formatSize(bytes) {
if (bytes < 1024) return bytes + ' B';
if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
return (bytes / 1048576).toFixed(2) + ' MB';
}

function handleFile(file) {
if (!file.type.match(/image\/(png|jpeg|webp)/)) { alert('请上传 PNG、JPEG 或 WebP 格式的图片'); return; }
originalFile = file;
const reader = new FileReader();
reader.onload = e => {
originalPreview.src = e.target.result;
originalSize.textContent = formatSize(file.size);
compressImage(e.target.result);
previewSection.classList.add('active');
};
reader.readAsDataURL(file);
}

function compressImage(dataUrl) {
const img = new Image();
img.onload = () => {
const canvas = document.createElement('canvas');
canvas.width = img.width;
canvas.height = img.height;
const ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0);
const quality = qualitySlider.value / 100;
canvas.toBlob(blob => {
compressedBlob = blob;
const url = URL.createObjectURL(blob);
compressedPreview.src = url;
compressedSize.textContent = formatSize(blob.size);
}, originalFile.type === 'image/png' ? 'image/jpeg' : originalFile.type, quality);
};
img.src = dataUrl;
}

qualitySlider.addEventListener('input', () => {
qualityLabel.textContent = qualitySlider.value + '%';
if (originalFile) {
const reader = new FileReader();
reader.onload = e => compressImage(e.target.result);
reader.readAsDataURL(originalFile);
}
});

downloadBtn.addEventListener('click', () => {
if (!compressedBlob) return;
const url = URL.createObjectURL(compressedBlob);
const a = document.createElement('a');
a.href = url;
const ext = originalFile.type === 'image/png' ? '.jpg' : originalFile.name.match(/\.[^.]+$/)[0];
a.download = originalFile.name.replace(/\.[^.]+$/, '_compressed' + ext);
a.click();
URL.revokeObjectURL(url);
});

resetBtn.addEventListener('click', () => {
originalFile = null;
compressedBlob = null;
previewSection.classList.remove('active');
fileInput.value = '';
});
</script>
</body>
</html>
