<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} - AI工具箱</title>
<meta name="description" content="{{DESC}} 完全免费，浏览器本地处理，无需下载。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--accent:#6366f1;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:30px 20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:24px}
.back:hover{text-decoration:underline}
header{text-align:center;margin-bottom:32px}
header .icon{font-size:3rem}
header h1{font-size:2rem;font-weight:800;margin:8px 0}
header p{color:var(--muted)}
.tool-area{background:var(--card);border-radius:16px;padding:32px;border:1px solid var(--border);box-shadow:var(--shadow)}
footer{text-align:center;margin-top:60px;padding-top:20px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">← 返回工具箱</a>
<header>
<div class="icon">{{ICON}}</div>
<h1>{{NAME}}</h1>
<p>{{DESC}}</p>
</header>
<div class="tool-area">
<p style="text-align:center;color:var(--muted);padding:40px 0">
工具功能开发中，明天上线完整版...
</p>
</div>
<footer>
<p>🛠️ <a href="/">AI工具箱</a> · 每日自动更新</p>
</footer>
</div>
</body>
</html>
